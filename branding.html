<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhijit Kumar Misra | Branding</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #3b82f6;
            --highlight: #8b5cf6;
            --card-bg: rgba(30, 41, 59, 0.5);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
        }

        .glow-1 {
            top: 20%;
            left: 20%;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, var(--accent-color) 0%, transparent 70%);
        }

        .glow-2 {
            bottom: 20%;
            right: 20%;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, var(--highlight) 0%, transparent 70%);
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Optimization: Prevent Black Screen Rendering */
        @media (max-width: 768px) {
            body {
                overflow-y: auto;
                background: #0b0f19; /* Solid fallback */
            }
            .glow {
                display: none; /* Blurs are the main cause of mobile black screens */
            }
            .card {
                backdrop-filter: none !important;
                -webkit-backdrop-filter: none !important;
                background: #1e293b;
                padding: 2rem 1.5rem;
                margin: 20px;
            }
        }

        .profile-img {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--accent-color), var(--highlight));
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--accent-color), var(--highlight));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            color: var(--text-secondary);
            margin: 0.5rem 0 2rem;
            font-weight: 300;
            font-size: 1rem;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-btn {
            padding: 0.8rem;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
            border-color: var(--accent-color);
        }

        .footer {
            margin-top: 2.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .developed-by {
            font-weight: 600;
            color: var(--highlight);
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <div class="card">
        <div class="profile-img">AKM</div>
        <h1>Jitu's Creative Works</h1>
        <p class="tagline">Abhijit Kumar Misra | Computing Enthusiast</p>

        <div class="links">
            <a href="index.html" class="link-btn">View Full Portfolio</a>
            <a href="https://github.com/Jitu-85" class="link-btn">GitHub Profile</a>
            <a href="mailto:abhijit.jitu4u@rediffmail.com" class="link-btn">Email Me</a>
        </div>

        <div class="footer">
            Developed by <span class="developed-by">Abhijit Kumar Misra</span>
        </div>
    </div>
</body>
</html>
